name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn -B verify

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: products-backend:ci

  k6-load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Package application
        run: mvn -B -DskipTests package

      - name: Start WireMock upstream stub
        run: |
          curl -sL -o wiremock-standalone.jar \
            https://repo1.maven.org/maven2/org/wiremock/wiremock-standalone/3.13.2/wiremock-standalone-3.13.2.jar
          nohup java -jar wiremock-standalone.jar --port 3001 --root-dir k6/wiremock > wiremock.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:3001/__admin/mappings > /dev/null && exit 0
            sleep 1
          done
          echo "WireMock did not start in time" && cat wiremock.log && exit 1

      - name: Start application
        env:
          UPSTREAM_BASE_URL: http://localhost:3001
          UPSTREAM_CONNECT_TIMEOUT: 1s
          UPSTREAM_RESPONSE_TIMEOUT: 1s
        run: |
          nohup java -jar target/products-backend-*.jar > app.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:5000/product/1/similar > /dev/null && exit 0
            sleep 1
          done
          echo "Application did not start in time" && cat app.log && exit 1

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 load test
        uses: grafana/run-k6-action@v1
        with:
          path: k6/load-test.js
        env:
          BASE_URL: http://localhost:5000

      - name: Upload k6 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: |
            k6/summary.json
            k6/summary.html
          if-no-files-found: warn
