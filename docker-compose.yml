services:
  products-backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Point this at the mocked upstream (e.g. the reference test harness's
      # `simulado` on port 3001) or at the real product catalog.
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-http://host.docker.internal:3001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
